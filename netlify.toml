# Netlify Configuration for Next.js

[build]
  # Set DATABASE_URL from NETLIFY_DATABASE_URL if not already set, then run build
  command = "export DATABASE_URL=${DATABASE_URL:-$NETLIFY_DATABASE_URL} && prisma generate && prisma db push --accept-data-loss && next build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Essential: Enable Next.js Runtime Plugin
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Cache static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

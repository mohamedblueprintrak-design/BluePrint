# =============================================================================
# BluePrint CI Pipeline
# Runs on push to main and on all pull requests
# Jobs: lint, type-check, test (parallel) → build (depends on all)
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  # Use bun when available in CI, fallback to npm
  PACKAGE_MANAGER: ''

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Install dependencies (shared cache)
  # ---------------------------------------------------------------------------
  install:
    name: 📦 Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Detect package manager
        id: pkg-manager
        run: |
          if command -v bun &>/dev/null; then
            echo "manager=bun" >> $GITHUB_OUTPUT
            echo "install_cmd=bun install --frozen-lockfile" >> $GITHUB_OUTPUT
          else
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "install_cmd=npm ci" >> $GITHUB_OUTPUT
          fi
          echo "Using package manager: $(echo $manager)"

      - name: Setup Bun (if needed)
        if: steps.pkg-manager.outputs.manager == 'bun'
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: ${{ steps.pkg-manager.outputs.install_cmd }}

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            .next/cache
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json', 'bun.lock') }}-${{ github.sha }}

  # ---------------------------------------------------------------------------
  # Job 2: Lint
  # ---------------------------------------------------------------------------
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            .next/cache
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json', 'bun.lock') }}-${{ github.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        continue-on-error: true

      - name: Run ESLint
        run: npx eslint . --max-warnings=100

  # ---------------------------------------------------------------------------
  # Job 3: Type Check
  # ---------------------------------------------------------------------------
  type-check:
    name: 🏷️ Type Check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            .next/cache
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json', 'bun.lock') }}-${{ github.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        continue-on-error: true

      - name: Run TypeScript compiler
        run: npx tsc --noEmit

  # ---------------------------------------------------------------------------
  # Job 4: Test
  # ---------------------------------------------------------------------------
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            .next/cache
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json', 'bun.lock') }}-${{ github.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        continue-on-error: true

      - name: Run tests with coverage
        run: npx jest --passWithNoTests --coverage --ci --forceExit

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 5: Build (depends on lint, type-check, test)
  # ---------------------------------------------------------------------------
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            .next/cache
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json', 'bun.lock') }}-${{ github.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        continue-on-error: true

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js application
        run: npx next build
        env:
          NODE_ENV: production
          DATABASE_URL: "file:./custom.db"
          JWT_SECRET: "ci-build-secret-do-not-use-in-production"
          NEXTAUTH_URL: "http://localhost:3000"

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next/
          retention-days: 3

  # ---------------------------------------------------------------------------
  # Job 6: CI Summary (final gate for branch protection)
  # ---------------------------------------------------------------------------
  ci-success:
    name: ✅ CI Passed
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, build]
    if: always()
    steps:
      - name: Check all jobs passed
        if: needs.lint.result == 'success' && needs.type-check.result == 'success' && needs.test.result == 'success' && needs.build.result == 'success'
        run: echo "All CI checks passed!"

      - name: Fail if any job failed
        if: needs.lint.result == 'failure' || needs.type-check.result == 'failure' || needs.test.result == 'failure' || needs.build.result == 'failure'
        run: |
          echo "CI failed. Check the following jobs:"
          [ "${{ needs.lint.result }}" != "success" ] && echo "  - lint: ${{ needs.lint.result }}"
          [ "${{ needs.type-check.result }}" != "success" ] && echo "  - type-check: ${{ needs.type-check.result }}"
          [ "${{ needs.test.result }}" != "success" ] && echo "  - test: ${{ needs.test.result }}"
          [ "${{ needs.build.result }}" != "success" ] && echo "  - build: ${{ needs.build.result }}"
          exit 1

                  type: string
                priority:
                  $ref: '#/components/schemas/TaskPriority'
                startDate:
                  type: string
                  format: date
                dueDate:
                  type: string
                  format: date
                estimatedHours:
                  type: number
                dependencies:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

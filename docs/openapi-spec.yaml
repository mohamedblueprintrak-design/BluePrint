  # ═══════════════════════════════════════════════════════════════════════════

  /invoices:
    get:
      tags: [Invoices]
      summary: List invoices
      description: Returns a paginated list of invoices with filtering.
      x-description-ar: إرجاع قائمة الفواتير مع التصفية.
      operationId: listInvoices
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: filter[status]
          in: query
          schema:
            $ref: '#/components/schemas/InvoiceStatus'
        - name: filter[projectId]
          in: query
          schema:
            type: string
        - name: filter[clientId]
          in: query
          schema:
            type: string
        - name: from
          in: query
          description: Filter by issue date (from)
          schema:
            type: string
            format: date
        - name: to
          in: query
          description: Filter by issue date (to)
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Paginated list of invoices
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Invoice'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'

    post:
      tags: [Invoices]
      summary: Create invoice
      description: Creates a new invoice for a project.
      x-description-ar: إنشاء فاتورة جديدة لمشروع.
      operationId: createInvoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectId, clientId, items]
              properties:
                invoiceNumber:
                  type: string
                projectId:
                  type: string
                clientId:
                  type: string
                currency:
                  type: string
                  default: SAR
                issueDate:
                  type: string
                  format: date
                dueDate:
                  type: string
                  format: date
                items:
                  type: array
                  items:
                    type: object
                    required: [description, quantity, unitPrice]
                    properties:
                      description:
                        type: string
                      quantity:
                        type: number
                      unitPrice:
                        type: number
                notes:
                  type: string
      responses:
        '201':
          description: Invoice created
        '409':
          description: Invoice number already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /invoices/{id}:
    get:
      tags: [Invoices]
      summary: Get invoice
      description: Returns an invoice by ID with line items.
      x-description-ar: إرجاع فاتورة بالمعرف مع البنود.
      operationId: getInvoice
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Invoice details
        '404':

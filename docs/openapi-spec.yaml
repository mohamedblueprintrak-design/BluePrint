    put:
      tags: [Invoices]
      summary: Update invoice
      description: Updates an invoice. Paid invoices cannot be modified.
      x-description-ar: تحديث فاتورة. لا يمكن تعديل الفواتير المدفوعة.
      operationId: updateInvoice
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: '#/components/schemas/InvoiceStatus'
                dueDate:
                  type: string
                  format: date
                notes:
                  type: string
      responses:
        '200':
          description: Invoice updated
        '409':
          description: Cannot modify paid invoice
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Invoices]
      summary: Delete invoice
      description: Deletes a draft invoice. Sent/paid invoices cannot be deleted.
      x-description-ar: حذف فاتورة مسودة. لا يمكن حذف الفواتير المرسلة/المدفوعة.
      operationId: deleteInvoice
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Invoice deleted
        '409':
          description: Cannot delete sent or paid invoice


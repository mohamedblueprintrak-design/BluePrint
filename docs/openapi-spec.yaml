      x-description-ar: تحديث مهمة موجودة.
      operationId: updateTask
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                status:
                  $ref: '#/components/schemas/TaskStatus'
                priority:
                  $ref: '#/components/schemas/TaskPriority'
                assigneeId:
                  type: string
                dueDate:
                  type: string
                  format: date
                actualHours:
                  type: number
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Tasks]
      summary: Delete task
      description: Deletes a task. Tasks with uncompleted sub-tasks cannot be deleted.
      x-description-ar: حذف مهمة. لا يمكن حذف المهام ذات المهام الفرعية غير المكتملة.
      operationId: deleteTask
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Task deleted
        '409':
          description: Task has uncompleted sub-tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


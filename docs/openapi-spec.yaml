        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Chat message history
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ChatMessage'


          type: string
          format: date
        deliveryAddress:
          type: string
        notes:
          type: string
        approvedById:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Notification:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        type:
          $ref: '#/components/schemas/NotificationType'
        title:
          type: string
        message:
          type: string
        data:
          type: object
        isRead:
          type: boolean
        actionUrl:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time

    KnowledgeArticle:

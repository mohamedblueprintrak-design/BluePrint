# ─────────────────────────────────────────────────────────────────────────────
# Security Schemes
# ─────────────────────────────────────────────────────────────────────────────

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from the login endpoint.

  # ── Reusable Parameter Definitions ───────────────────────────────────────

  parameters:
    RequestId:
      name: X-Request-Id
      in: header
      description: Optional unique request identifier for tracing.
      schema:
        type: string
      required: false
    Page:
      name: page
      in: query
      description: Page number (1-based).
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      description: Number of items per page.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    SortBy:
      name: sortBy
      in: query
      description: Field to sort by.
      schema:
        type: string
    SortOrder:
      name: sortOrder
      in: query
      description: Sort direction.
      schema:
        type: string
        enum: [asc, desc]
        default: desc
    Search:
      name: search
      in: query
      description: Full-text search term.
      schema:
        type: string
    ResourceId:
      name: id
      in: path
      description: Unique resource identifier (CUID).
      required: true
      schema:
        type: string

  # ── Common Schemas ───────────────────────────────────────────────────────

  schemas:
    # ── Pagination ────────────────────────────────────────────────────────
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 150
        totalPages:
          type: integer
          example: 8
        hasNext:
          type: boolean
          example: true
        hasPrev:
          type: boolean
          example: false

    # ── Error Response ────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: RESOURCE_NOT_FOUND
            message:
              type: string
              example: The requested resource was not found.
            details:
              oneOf:
                - type: object
                - type: array
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    ValidationErrorField:
      type: object
      properties:
        field:
          type: string
          example: name
        message:
          type: string
          example: String must contain at least 1 character(s)
        code:
          type: string
          example: too_small

    ValidationErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: object
          properties:
            code:
              type: string
              example: VALIDATION_INVALID_INPUT
            message:
              type: string
            details:
              type: array
              items:
                $ref: '#/components/schemas/ValidationErrorField'

    # ── Success Response ───────────────────────────────────────────────────
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

    # ── Enums ─────────────────────────────────────────────────────────────
    ProjectStatus:
      type: string
      enum:
        - planning
        - active
        - on_hold
        - completed
        - cancelled
        - archived
      description: Project lifecycle status
      x-description-ar: حالة دورة حياة المشروع

    TaskStatus:
      type: string
      enum:
        - todo
        - in_progress
        - in_review
        - done
        - cancelled
      description: Task status
      x-description-ar: حالة المهمة

    TaskPriority:
      type: string
      enum:
        - low
        - medium
        - high
        - critical
      description: Task priority level
      x-description-ar: مستوى أولوية المهمة

    InvoiceStatus:
      type: string
      enum:
        - draft
        - sent
        - paid
        - overdue
        - cancelled
      description: Invoice status
      x-description-ar: حالة الفاتورة

    ContractStatus:
      type: string
      enum:
        - draft
        - active
        - expired
        - terminated
      description: Contract status
      x-description-ar: حالة العقد

    ProposalStatus:
      type: string
      enum:
        - draft
        - sent
        - accepted
        - rejected
        - expired
      description: Proposal status
      x-description-ar: حالة المقترح

    LeaveStatus:
      type: string
      enum:
        - pending
        - approved
        - rejected
        - cancelled
      description: Leave request status
      x-description-ar: حالة طلب الإجازة

    LeaveType:
      type: string
      enum:
        - annual
        - sick
        - emergency
        - maternity
        - unpaid
      description: Type of leave
      x-description-ar: نوع الإجازة

    DefectSeverity:
      type: string
      enum:
        - minor
        - moderate
        - major
        - critical
      description: Defect severity level
      x-description-ar: مستوى شدة العيب

    RiskLevel:
      type: string
      enum:
        - low
        - medium
        - high
        - critical
      description: Risk severity level
      x-description-ar: مستوى خطورة المخاطرة

    POStatus:
      type: string
      enum:
        - draft
        - submitted
        - approved
        - ordered
        - delivered
        - cancelled
      description: Purchase order status
      x-description-ar: حالة أمر الشراء

    NotificationType:
      type: string
      enum:
        - info
        - warning
        - success
        - error
        - task_assigned
        - task_due
        - approval_required
        - invoice_paid
      description: Notification type
      x-description-ar: نوع الإشعار

    UserRole:
      type: string
      enum:
        - admin
        - project_manager
        - engineer
        - contractor
        - client
        - viewer
      description: User role within the system
      x-description-ar: دور المستخدم في النظام

    # ── Core Models ───────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        avatarUrl:
          type: string
          format: uri
        organizationId:
          type: string
        isActive:
          type: boolean
        lastLoginAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Project:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          example: Tower A - Residential Complex
        code:
          type: string
          example: PRJ-2024-001
        description:
          type: string
        status:
          $ref: '#/components/schemas/ProjectStatus'
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        budget:
          type: number
          format: double
          example: 5000000
        spent:
          type: number
          format: double
          example: 2150000
        progress:
          type: number
          format: double
          minimum: 0
          maximum: 100
          example: 43
        location:
          type: string
          example: Riyadh, Saudi Arabia
        clientId:
          type: string
        client:
          $ref: '#/components/schemas/Client'
        managerId:
          type: string
        manager:
          $ref: '#/components/schemas/User'
        members:
          type: array
          items:
            $ref: '#/components/schemas/User'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Task:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
          example: Foundation Excavation
        description:
          type: string
        status:
          $ref: '#/components/schemas/TaskStatus'
        priority:
          $ref: '#/components/schemas/TaskPriority'
        projectId:
          type: string
        assigneeId:
          type: string
        assignee:
          $ref: '#/components/schemas/User'
        startDate:
          type: string
          format: date
        dueDate:
          type: string
          format: date
        estimatedHours:
          type: number
        actualHours:
          type: number
        dependencies:
          type: array
          items:
            type: string
        subtasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        attachments:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              url:
                type: string
              size:
                type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Client:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          example: Al-Rajhi Development Corp.
        email:
          type: string
          format: email
        phone:
          type: string
        company:
          type: string
        address:
          type: string
        contactPerson:
          type: string
        taxId:
          type: string
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Invoice:
      type: object
      properties:
        id:
          type: string
        invoiceNumber:
          type: string
          example: INV-2024-001
        projectId:
          type: string
        clientId:
          type: string
        status:
          $ref: '#/components/schemas/InvoiceStatus'
        subtotal:
          type: number
          format: double
        tax:
          type: number
          format: double
        total:
          type: number
          format: double
          example: 150000
        currency:
          type: string
          default: SAR
        issueDate:
          type: string
          format: date
        dueDate:
          type: string
          format: date
        paidDate:
          type: string
          format: date
        items:
          type: array
          items:
            type: object
            properties:
              description:
                type: string
              quantity:
                type: number
              unitPrice:
                type: number
              total:
                type: number
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Contract:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
          example: Construction Agreement - Tower A
        contractNumber:
          type: string
          example: CTR-2024-001
        projectId:
          type: string
        clientId:
          type: string
        status:
          $ref: '#/components/schemas/ContractStatus'
        value:
          type: number
          format: double
          example: 5000000
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        terms:
          type: string
        attachmentUrl:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Proposal:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        projectId:
          type: string
        clientId:
          type: string
        status:
          $ref: '#/components/schemas/ProposalStatus'
        version:
          type: integer
        estimatedBudget:
          type: number
          format: double
        estimatedDuration:
          type: integer
          description: Duration in days
        scopeOfWork:
          type: string
        terms:
          type: string
        validUntil:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BOQItem:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        category:
          type: string
          example: Civil Works
        description:
          type: string
          example: Ready-mix concrete C40
        unit:
          type: string
          example: m³
        quantity:
          type: number
        unitPrice:
          type: number
        totalPrice:
          type: number
        specification:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Transmittal:
      type: object
      properties:
        id:
          type: string
        referenceNumber:
          type: string
          example: TRN-2024-001
        projectId:
          type: string
        title:
          type: string
        from:
          type: string
        to:
          type: string
        subject:
          type: string
        documents:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              url:
                type: string
              documentNumber:
                type: string
        status:
          type: string
          enum: [draft, sent, acknowledged, returned]
        responseDueDate:
          type: string
          format: date
        remarks:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Defect:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        title:
          type: string
          example: Crack in column C-12
        description:
          type: string
        severity:
          $ref: '#/components/schemas/DefectSeverity'
        status:
          type: string
          enum: [open, in_progress, resolved, closed]
        location:
          type: string
          example: Level 3, Zone B
        reportedById:
          type: string
        assignedToId:
          type: string
        dueDate:
          type: string
          format: date
        images:
          type: array
          items:
            type: string
            format: uri
        resolutionNotes:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SiteReport:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        reportDate:
          type: string
          format: date
        reportType:
          type: string
          enum: [daily, weekly, monthly]
        weather:
          type: object
          properties:
            temperature:
              type: number
            condition:
              type: string
              example: Sunny
        manpower:
          type: object
          properties:
            total:
              type: integer
            byRole:
              type: object
              additionalProperties:
                type: integer
        workCompleted:
          type: string
        workPlanned:
          type: string
        issues:
          type: string
        safetyIncidents:
          type: integer
          default: 0
        photos:
          type: array
          items:
            type: string
            format: uri
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Risk:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        title:
          type: string
          example: Material price increase
        description:
          type: string
        category:
          type: string
          enum: [financial, technical, operational, environmental, legal, safety]
        level:
          $ref: '#/components/schemas/RiskLevel'
        probability:
          type: string
          enum: [low, medium, high]
        impact:
          type: string
          enum: [low, medium, high]
        mitigationPlan:
          type: string
        owner:
          type: string
        status:
          type: string
          enum: [identified, analysing, mitigating, accepted, transferred, closed]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Attendance:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        projectId:
          type: string
        date:
          type: string
          format: date
        checkIn:
          type: string
          format: date-time
        checkOut:
          type: string
          format: date-time
        hoursWorked:
          type: number
        status:
          type: string
          enum: [present, absent, late, half_day]
        notes:
          type: string
        createdAt:
          type: string
          format: date-time

    LeaveRequest:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        type:
          $ref: '#/components/schemas/LeaveType'
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        days:
          type: number
        reason:
          type: string
        status:
          $ref: '#/components/schemas/LeaveStatus'
        approvedById:
          type: string
        rejectionReason:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Material:

          type: string
        title:
          type: string
        content:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        authorId:
          type: string
        status:
          type: string
          enum: [draft, published, archived]
        isPublic:
          type: boolean
        views:

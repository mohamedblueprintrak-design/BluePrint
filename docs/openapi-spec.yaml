        minimumStock:
          type: number
        unitCost:
          type: number
        supplierId:
          type: string
        projectId:
          type: string
        lastOrderDate:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PurchaseOrder:

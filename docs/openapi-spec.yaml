        contactPerson:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        address:
          type: string
        taxId:
          type: string
        rating:
          type: number
          minimum: 0
          maximum: 5
        categories:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ChatMessage:
      type: object
      properties:
        id:
          type: string
        conversationId:
          type: string
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
        timestamp:
          type: string
          format: date-time
        metadata:
          type: object

    WorkflowAction:
      type: object
      properties:
        id:
          type: string
        workflowId:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [approval, notification, task_creation, status_update, field_update]
        assigneeId:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected, skipped]
        completedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    HealthCheckResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        timestamp:
          type: string
          format: date-time
        system:
          type: object
          properties:
            nodeVersion:
              type: string
            environment:
              type: string
            uptimeSeconds:
              type: integer
            memory:
              type: object
              properties:
                rssMB:
                  type: string
                heapUsagePercent:
                  type: number
        checks:
          type: array
          items:
            type: object
            properties:
              component:
                type: string
              status:
                type: string
              message:
                type: string
              responseTimeMs:
                type: number

# ─────────────────────────────────────────────────────────────────────────────
# Paths (51 API Endpoints)
# ─────────────────────────────────────────────────────────────────────────────

paths:

  # ═══════════════════════════════════════════════════════════════════════════
  # HEALTH (1 endpoint)
  # ═══════════════════════════════════════════════════════════════════════════

  /health:
    get:
      tags: [Health]
      summary: System health check
      description: >
        Returns the health status of the system including database connectivity,
        memory usage, disk space, and external service availability.
        Used by monitoring tools and container orchestrators.
      x-description-ar: >
        إرجاع حالة صحة النظام بما في ذلك اتصال قاعدة البيانات،
        استخدام الذاكرة، مساحة القرص، وتوفر الخدمات الخارجية.
      security: []
      operationId: getHealth
      responses:
        '200':
          description: System is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '503':
          description: System is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckResponse'

  # ═══════════════════════════════════════════════════════════════════════════
  # AUTHENTICATION (3 endpoints)
  # ═══════════════════════════════════════════════════════════════════════════

  /auth/login:
    post:
      tags: [Authentication]
      summary: User login
      description: Authenticates a user with email and password, returning a JWT token.
      x-description-ar: مصادقة المستخدم بالبريد الإلكتروني وكلمة المرور، وإرجاع رمز JWT.
      security: []
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: admin@blueprint.sa
                password:
                  type: string
                  format: password
                  example: SecurePassword123!
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        description: JWT access token.
                      user:
                        $ref: '#/components/schemas/User'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many login attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/register:
    post:
      tags: [Authentication]
      summary: User registration
      description: Creates a new user account.
      x-description-ar: إنشاء حساب مستخدم جديد.
      security: []
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                  minLength: 8
                name:
                  type: string
                organizationName:
                  type: string
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /auth/me:
    get:
      tags: [Authentication]
      summary: Get current user
      description: Returns the currently authenticated user's profile.
      x-description-ar: إرجاع ملف تعريف المستخدم المصادق عليه حاليًا.
      operationId: getCurrentUser
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ═══════════════════════════════════════════════════════════════════════════
  # PROJECTS (3 endpoints)
  # ═══════════════════════════════════════════════════════════════════════════

  /projects:
    get:
      tags: [Projects]
      summary: List projects
      description: Returns a paginated list of projects with filtering, sorting, and search.
      x-description-ar: إرجاع قائمة مشاريع مع ترقيم الصفحات والتصفية والفرز والبحث.
      operationId: listProjects
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortOrder'
        - $ref: '#/components/parameters/Search'
        - name: filter[status]
          in: query
          schema:
            type: string
        - name: filter[clientId]
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of projects
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/paths/~1auth~1login/post/responses/401'

    post:
      tags: [Projects]
      summary: Create project
      description: Creates a new construction project.
      x-description-ar: إنشاء مشروع بناء جديد.
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, code, clientId, startDate, endDate]
              properties:
                name:
                  type: string
                  maxLength: 200
                code:
                  type: string
                  maxLength: 50
                description:
                  type: string
                clientId:
                  type: string
                managerId:
                  type: string
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
                budget:
                  type: number
                location:
                  type: string
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '409':
          description: Project code already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/paths/~1auth~1register/post/responses/422'

  /projects/{id}:
    get:
      tags: [Projects]
      summary: Get project
      description: Returns a single project by ID with full details.
      x-description-ar: إرجاع مشروع واحد بالمعرف مع التفاصيل الكاملة.
      operationId: getProject
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Projects]
      summary: Update project
      description: Updates an existing project.
      x-description-ar: تحديث مشروع موجود.
      operationId: updateProject
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                status:
                  $ref: '#/components/schemas/ProjectStatus'
                budget:
                  type: number
                progress:
                  type: number
                endDate:
                  type: string
                  format: date
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Invalid status transition or budget exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Projects]
      summary: Delete project
      description: Soft-deletes a project. Active projects cannot be deleted.
      x-description-ar: حذف مشروع (حذف ناعم). لا يمكن حذف المشاريع النشطة.
      operationId: deleteProject
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Project deleted successfully
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cannot delete active project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


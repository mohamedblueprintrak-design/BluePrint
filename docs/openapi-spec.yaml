    تغطي دورة حياة المشروع، إدارة المهام، العمليات المالية، المشتريات، مراقبة الجودة، الموارد البشرية، والميزات المدعومة بالذكاء الاصطناعي.
  version: 1.0.0
  contact:
    name: BluePrint API Support
    email: api@blueprint.sa
    url: https://docs.blueprint.sa
  license:
    name: Proprietary
    url: https://blueprint.sa/license

servers:

  # AI CHAT (2 endpoints)
  # ═══════════════════════════════════════════════════════════════════════════

  /ai/chat:
    post:
      tags: [AI Chat]
      summary: Send chat message
      description: >
        Sends a message to the AI assistant and receives a response.
        Supports streaming (SSE) or regular JSON responses.
      x-description-ar: >
        إرسال رسالة للمساعد الذكي واستلام رد.
        يدعم البث (SSE) أو استجابات JSON العادية.
      operationId: sendChatMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  maxLength: 4000
                conversationId:
                  type: string
                context:
                  type: object
                  description: Additional context (e.g., project ID, current page)
                  properties:
                    projectId:
                      type: string
                    page:
                      type: string
                stream:
                  type: boolean
                  default: false
      responses:
        '200':
          description: AI response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                      conversationId:
                        type: string
                      timestamp:
                        type: string
        '429':
          description: AI rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ai/chat/{conversationId}/history:
    get:
      tags: [AI Chat]
      summary: Get chat history
      description: Returns the message history for a conversation.
      x-description-ar: إرجاع سجل الرسائل لمحادثة.
      operationId: getChatHistory
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
